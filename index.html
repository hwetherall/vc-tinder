<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VC Directory</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">VC&nbsp;Directory <span class="ver" id="ver"></span></div>
    <nav class="topbar-nav">
      <button class="navbtn" id="toDirectory">VCs</button>
      <button class="navbtn" id="toDigest">Digest</button>
      <button class="navbtn" id="toUpload">Upload</button>
    </nav>
    <div class="topbar-actions">
      <button class="btn ghost" id="exportBtn" title="Write the scored CSV back into the repo">Export CSV</button>
      <button class="btn ghost" id="resetBtn" title="Clear saved tier changes and the exported CSV">Reset</button>
    </div>
  </header>

  <main>
    <!-- Directory view (default) -->
    <section id="dirView">
      <div class="dir-controls">
        <input id="dirSearch" class="search" type="search"
               placeholder="Search name, location, stage, tags…" autocomplete="off" />
        <select id="dirTier" class="search select" title="Filter by tier">
          <option value="0">All tiers</option>
          <option value="1">Tier 1 · Open now</option>
          <option value="2">Tier 2 · Cultivate</option>
          <option value="3">Tier 3 · Follow</option>
          <option value="4">Tier 4 · Referral</option>
          <option value="5">Tier 5 · Pass</option>
        </select>
        <select id="dirProx" class="search select" title="Filter by proximity">
          <option value="">Any proximity</option>
          <option value="Hot">Hot</option>
          <option value="Warm">Warm</option>
          <option value="Cold">Cold</option>
        </select>
        <label class="chk"><input type="checkbox" id="dirWatched" /> Watched only</label>
        <span class="dir-count" id="dirCount"></span>
      </div>
      <div class="dir-table" id="dirTable"></div>
    </section>

    <!-- Dossier view (single firm) -->
    <section id="dossierView" hidden>
      <div class="panel" id="dossier"></div>
    </section>

    <!-- Digest view -->
    <section id="digestView" hidden>
      <div class="panel" id="digests"></div>
    </section>

    <!-- Upload view -->
    <section id="uploadView" hidden>
      <div class="panel">
        <h2 class="u-title">Upload a target list</h2>
        <p class="dim">CSV with at least a firm-name column (<code>VC</code>/<code>Firm</code>/<code>Fund</code>…).
          Recognized extras: Contact, Title, Email, LinkedIn, Location, Website, Proximity, Tier, scores.
          Duplicates (by firm name) merge with what's already in the database.</p>
        <div class="u-row">
          <input type="file" id="uploadFile" accept=".csv,text/csv" />
          <button class="btn primary" id="uploadBtn">Import to database</button>
        </div>
        <div id="uploadResult" class="u-result"></div>
        <div class="u-row">
          <button class="btn" id="scoreBtn" hidden>▶ Score unscored firms</button>
        </div>
        <pre id="scoreStatus" class="u-log" hidden></pre>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
